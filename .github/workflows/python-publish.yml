# This workflow will upload a Python Package using uv when a release is created
# For more information see: https://docs.astral.sh/uv/guides/publish/

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      UV_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.7.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --no-interaction --no-root

    - name: Build package
      run: poetry build

    - name: Publish package
      run: |
        poetry config pypi-token.pypi "$UV_PYPI_TOKEN"
        poetry publish --no-interaction
